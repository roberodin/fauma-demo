<!DOCTYPE html><html class="light" lang="es"><head>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;

<body class="bg-background text-on-background font-body min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#FFF8F2] dark:bg-slate-950 flex items-center justify-between px-4 h-16 w-full docked full-width top-0 border-b border-slate-200 dark:border-slate-800 sticky z-50">
<div class="flex items-center gap-3">
<button class="p-2 hover:bg-[#1A6B72]/5 dark:hover:bg-teal-900/20 rounded-full transition-colors active:scale-95 duration-150 ease-in-out" style="">
<span class="material-symbols-outlined text-[#1A6B72] dark:text-teal-500" data-icon="arrow_back" style="">arrow_back</span>
</button>
<h1 class="font-serif Newsreader text-lg font-bold text-[#1A6B72] dark:text-teal-500" style="">Shipping Address</h1>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="max-w-md mx-auto px-6 pt-6 space-y-8">
<!-- Progress Indicator -->
<nav class="flex items-center justify-between px-8 relative">
<div class="absolute top-1/2 left-8 right-8 h-0.5 bg-surface-variant -z-10 -translate-y-1/2"></div>
<!-- Step 1 Done -->
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary-container text-white flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-sm" data-icon="check" style="">check</span>
</div>
<span class="text-[10px] font-medium text-secondary" style="">Nivel</span>
</div>
<!-- Step 2 Active -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary-container ring-4 ring-primary/10 text-white flex items-center justify-center shadow-md">
<span class="material-symbols-outlined" data-icon="local_shipping" style="">local_shipping</span>
</div>
<span class="text-[10px] font-bold text-primary" style="">Envío</span>
</div>
<!-- Step 3 Pending -->
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-surface-variant text-secondary flex items-center justify-center">
<span class="material-symbols-outlined text-sm" data-icon="payments" style="">payments</span>
</div>
<span class="text-[10px] font-medium text-secondary" style="">Pago</span>
</div>
</nav>
<!-- Order Summary Card -->
<section class="bg-surface-container-low rounded-lg p-5 flex items-center gap-4 border border-surface-variant/30">
<div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Close-up portrait of a sea turtle swimming in turquoise clear ocean water with soft natural light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCfrFXxwMFxj8_flVu70NnLO2eP0hT0sSOMlFouNrWXjyS8ax0HaGdBMcM2zdQbOOTE7FRpSPW4yU5txH1nCSgl5KcPepjCEn1cWInHJITaHsCx90m1RIV_agGXZERi-g4H2qJ1-9UAGxlUeHyn9n7lIb-qzlyhvJnvq-eciLRf-gP4Pm9_rJ8BncUpTSxO9ODH5ntjTJ8CMq5dAdchxQMnNdQ81asTBfQM7IGq3N8b6qYyU6W1BISC-ezPjuiiIndJZzp6aXtBbYWa" style="">
</div>
<div class="flex-1">
<h2 class="font-headline text-lg font-bold leading-tight" style="">Tortuga Caretta · Hermano</h2>
<div class="flex items-center justify-between mt-1">
<p class="text-secondary text-sm font-medium" style="">€15/mes</p>
<span class="text-[11px] bg-primary/10 text-primary px-2 py-0.5 rounded-full" style="">Incluye regalo🐢</span>
</div>
</div>
</section>
<!-- Form Section -->
<section class="space-y-4">
<div class="space-y-1">
<label class="text-[12px] font-semibold text-secondary ml-4" style="">Nombre completo</label>
<input class="w-full px-6 py-4 rounded-full bg-surface-container-lowest border-none focus:ring-2 focus:ring-primary shadow-sm placeholder:text-outline/50" placeholder="Tu nombre y apellidos" type="text">
</div>
<div class="space-y-1">
<label class="text-[12px] font-semibold text-secondary ml-4" style="">Dirección (calle y número)</label>
<input class="w-full px-6 py-4 rounded-full bg-surface-container-lowest border-none focus:ring-2 focus:ring-primary shadow-sm placeholder:text-outline/50" placeholder="Ej. Calle Mayor 123" type="text">
</div>
<div class="space-y-1">
<label class="text-[12px] font-semibold text-secondary ml-4" style="">Piso / Puerta (opcional)</label>
<input class="w-full px-6 py-4 rounded-full bg-surface-container-lowest border-none focus:ring-2 focus:ring-primary shadow-sm placeholder:text-outline/50" placeholder="2º B, Ático..." type="text">
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<label class="text-[12px] font-semibold text-secondary ml-4" style="">Código postal</label>
<input class="w-full px-6 py-4 rounded-full bg-surface-container-lowest border-none focus:ring-2 focus:ring-primary shadow-sm placeholder:text-outline/50" placeholder="28001" type="text">
</div>
<div class="space-y-1">
<label class="text-[12px] font-semibold text-secondary ml-4" style="">Ciudad</label>
<input class="w-full px-6 py-4 rounded-full bg-surface-container-lowest border-none focus:ring-2 focus:ring-primary shadow-sm placeholder:text-outline/50" placeholder="Madrid" type="text">
</div>
</div>
<div class="space-y-1">
<label class="text-[12px] font-semibold text-secondary ml-4" style="">Provincia</label>
<div class="relative">
<select class="w-full px-6 py-4 rounded-full bg-surface-container-lowest border-none focus:ring-2 focus:ring-primary shadow-sm appearance-none cursor-pointer">
<option>Selecciona una provincia</option>
<option>Madrid</option>
<option>Barcelona</option>
<option>Valencia</option>
<option>Sevilla</option>
</select>
<span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-secondary" data-icon="expand_more" style="">expand_more</span>
</div>
</div>
<div class="space-y-1">
<label class="text-[12px] font-semibold text-secondary ml-4" style="">País</label>
<div class="relative">
<select class="w-full px-6 py-4 rounded-full bg-surface-container-lowest border-none focus:ring-2 focus:ring-primary shadow-sm appearance-none cursor-pointer">
<option selected="">España 🇪🇸</option>
<option>Portugal 🇵🇹</option>
<option>Francia 🇫🇷</option>
</select>
<span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-secondary" data-icon="expand_more" style="">expand_more</span>
</div>
</div>
<div class="space-y-1">
<label class="text-[12px] font-semibold text-secondary ml-4" style="">Teléfono de contacto</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-secondary" data-icon="phone_iphone" style="">phone_iphone</span>
<input class="w-full pl-14 pr-6 py-4 rounded-full bg-surface-container-lowest border-none focus:ring-2 focus:ring-primary shadow-sm placeholder:text-outline/50" placeholder="+34 600 000 000" type="tel">
</div>
</div>
</section>
<!-- Delivery Info Card -->
<section class="bg-surface-container-lowest rounded-lg p-5 border border-surface-variant/20 shadow-sm space-y-3">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-primary mt-0.5" data-icon="package_2" style="">package_2</span>
<p class="text-sm text-secondary leading-tight" style="">Envío estimado: <span class="font-bold text-on-background" style="">7-10 días laborables</span></p>
</div>
<div class="flex items-center gap-3 bg-primary/5 p-3 rounded-lg">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="verified" data-weight="fill" style="">verified</span>
<p class="text-sm text-primary font-medium" style="">Envío gratuito incluido en tu suscripción</p>
</div>
</section>
<!-- Save Address Toggle -->
<div class="flex items-center justify-between px-2 bg-transparent">
<span class="text-sm font-medium text-secondary" style="">Guardar como dirección principal</span>
<button class="relative inline-flex h-6 w-11 items-center rounded-full bg-primary-container" style="">
<span class="inline-block h-4 w-4 transform rounded-full bg-white transition translate-x-6"></span>
</button>
</div>
</main>
<!-- Sticky CTA Container -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background via-background to-transparent pt-12 z-40">
<button class="w-full bg-tertiary-container hover:bg-tertiary transition-all active:scale-[0.98] text-on-tertiary-container font-semibold py-5 rounded-full shadow-lg flex items-center justify-center gap-2 group" style="">
<span class="" style="">Continuar al pago</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward" style="">arrow_forward</span>
</button>
</div>
<!-- BottomNavBar (Hidden on transactional pages per rules, but included if structure requires shell logic) -->
<!-- Suppression Logic: Suppressed as this is a transactional sub-page with focused journey -->
</body></html>
