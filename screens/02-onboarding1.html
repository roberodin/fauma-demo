</div>
<!-- Floating Data Plate (Scientific Plate Component) -->
<div class="absolute -bottom-4 right-10 bg-surface-container-low rounded-lg p-4 shadow-xl max-w-[180px]">
<p class="font-label text-[10px] uppercase tracking-widest text-secondary font-bold mb-1">Especie destacada</p>
<p class="font-headline italic text-lg text-primary leading-tight">Chelonia mydas</p>
</div>
</section>

<h1 class="font-headline text-5xl md:text-6xl text-on-surface font-extrabold tracking-tight leading-none mb-6">
                Elige tu <span class="serif-italic text-primary">especie</span>.
            </h1>
<p class="font-body text-lg md:text-xl text-on-surface-variant leading-relaxed opacity-90 max-w-lg">

            </p>
</section>
