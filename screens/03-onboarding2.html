<body class="bg-background text-on-surface font-body antialiased">
<!-- Focused View: Excluded Shared TopAppBar for Minimal Back-to-Main Navigation -->
<header class="flex items-center bg-background px-6 py-8 justify-between max-w-xl mx-auto">
<div class="text-on-surface flex size-10 items-center justify-center rounded-full bg-surface-container-low transition-colors hover:bg-surface-container-high cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h1 class="font-headline text-2xl font-bold tracking-tight text-primary">Fauma</h1>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="max-w-xl mx-auto px-6 flex flex-col items-center min-h-[calc(100vh-100px)]">
<!-- Illustration Section: Support Cards -->
<div class="w-full relative flex justify-center items-center py-10 overflow-visible">
<!-- Asymmetrical Card Stack -->
<div class="relative w-full max-w-[320px] aspect-[4/5]">
<!-- Back Card (Hermano) -->
<div class="absolute top-4 -right-4 w-full h-full bg-surface-container-high rounded-xl rotate-6 flex flex-col p-6 shadow-sm">
<div class="flex-grow rounded-lg overflow-hidden mb-4 grayscale-[0.2]">
<img class="w-full h-full object-cover" data-alt="Stunning close-up of a majestic lion in the savannah with golden hour lighting and warm amber tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAWbntou49bqqvt0dKhoRzcYQHOCoV0InJHExfpqcpLa4h_4XQL9wa1qiN32PdjnYDWwo6POXTh3HFRa86TPO-gRG87rzGIvAdEYuBiC58oGDO_frQX3SJFQM4MsOLxEPCpXYPbCzg6Y5Yv14cnVqWhqnYRjvrrj8DR7RE9bVCGaSjclx8FiarUdgbQosag0zUK-aaQzCxIFLObXrYhsy-GZ2IEOueWufEd_1j9s1SMafSMndrwdYDh82bCYzn62ngsdBo9f09pV8D4"/>
</div>
<span class="font-label text-[10px] tracking-widest uppercase text-secondary">Nivel Superior</span>
<h3 class="font-headline text-xl text-primary">Hermano</h3>
</div>
<!-- Front Card (Amigo) -->
<div class="absolute top-0 right-0 w-full h-full bg-surface-container-lowest rounded-xl -rotate-3 p-6 shadow-lg z-10">
<div class="flex-grow rounded-lg overflow-hidden mb-4">
<img class="w-full h-full object-cover" data-alt="Portrait of a red panda among lush green bamboo leaves with soft cinematic lighting and bokeh background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJjuNFsyHvJwL57NqQ4ggOXssym6Od9liGGTeL-UJCGi8qMAsb4j8kERX8gqtB9vjHm8thooLBIA2zGRNQh-BER69N3sH9uZdKJX70R9NrummGfftkfn6dBTrZS1D9EAta8PFWQ9gBE06OHRq_sPVSlepsbXXsfdfwIxQzNZqUbzymnfRIgO9kwCtz6dr93H6gewj4K7dwNSnGbCr_y_BPFMhzfOQEq4tjCLSQZe2TWp-7XugSndiUimPoPWLbKbvNTLoNiIPgfwNk"/>
</div>
<span class="font-label text-[10px] tracking-widest uppercase text-secondary">Nivel Base</span>
<h3 class="font-headline text-2xl text-primary">Amigo</h3>
<div class="mt-2 flex items-center gap-1 text-primary">
<span class="font-bold">5€</span>
<span class="text-xs opacity-70">/mes</span>
</div>
</div>
</div>
</div>
<!-- Copy Content -->
<div class="text-center space-y-4 mt-8">
<h2 class="font-headline text-3xl font-bold leading-tight text-on-surface px-4">
                Apoya con tu suscripción
            </h2>
<p class="font-body text-base leading-relaxed text-on-surface-variant max-w-xs mx-auto">
                Elige el nivel que se adapte a ti. Desde 5€/mes ya recibes contenido exclusivo de los animales que proteges.
            </p>
</div>
<!-- Progress Indicator -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-10">
<div class="h-2 w-2 rounded-full bg-surface-variant"></div>
<div class="h-2 w-10 rounded-full bg-primary transition-all"></div>
<div class="h-2 w-2 rounded-full bg-surface-variant"></div>
</div>
<!-- Call to Action -->
<div class="w-full mt-auto pb-12 px-4">
<button class="w-full signature-gradient text-on-primary font-body font-semibold py-5 rounded-full shadow-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Siguiente</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<button class="w-full mt-4 text-on-surface-variant font-label text-sm uppercase tracking-widest py-2 opacity-60 hover:opacity-100 transition-opacity">

            </button>
</div>
